version: "3.9"

services:
  neo4j:
    image: neo4j:5.26
    container_name: gsp-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_default__advertised__address: localhost
      NEO4J_server_bolt_advertised__address: localhost:7687
      NEO4J_server_http_advertised__address: localhost:7474
    volumes:
      - neo4j_data:/data
      - ./neo4j/migrations:/migrations:ro
      - ./neo4j/queries:/queries:ro

volumes:
  neo4j_data:
